<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF 工具箱 · 本地处理不上传</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f; --surface:rgba(255,255,255,.04); --surface2:rgba(255,255,255,.06);
  --border:#2a2724; --border2:#3a352f;
  --text:#e8e4df; --muted:#9a9590; --faint:#6d6862;
  --gold:#d4a574; --gold-deep:#b88a55; --pink:#e8b4b8; --ink:#1a140c;
  --radius:14px; --radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',-apple-system,'PingFang SC',sans-serif;min-height:100vh;position:relative;overflow-x:hidden}
.blob{position:fixed;border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none}
.b1{width:420px;height:420px;background:var(--gold);opacity:.16;top:-160px;right:-120px}
.b2{width:380px;height:380px;background:var(--pink);opacity:.10;bottom:-160px;left:-120px}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:48px 24px 80px}
header{margin-bottom:14px}
.logo{font-family:'Cormorant',serif;font-weight:700;font-size:42px;line-height:1;color:var(--text)}
.logo b{color:var(--gold);font-weight:700}
.tagline{font-size:14px;color:var(--muted);margin-top:12px;letter-spacing:.04em}
.trust{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-size:12px;color:var(--gold);background:rgba(212,165,116,.08);border:1px solid rgba(212,165,116,.25);padding:6px 14px;border-radius:99px}
.trust svg{width:14px;height:14px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px;margin-top:34px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;gap:10px;text-align:left}
.card:hover{border-color:var(--gold-deep);background:var(--surface2);transform:translateY(-2px)}
.card .ic{width:30px;height:30px;color:var(--gold)}
.card .ic svg{width:100%;height:100%}
.card h3{font-size:15.5px;font-weight:500;color:var(--text)}
.card p{font-size:12px;color:var(--muted);line-height:1.5}

.tool{display:none}
.tool.active{display:block}
.home.hide{display:none}
.back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:20px;padding:6px 0;transition:.15s}
.back:hover{color:var(--gold)}
.back svg{width:16px;height:16px}
.tool-head{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.tool-head .ic{width:34px;height:34px;color:var(--gold)}
.tool-head h2{font-family:'Cormorant',serif;font-size:30px;font-weight:600}
.tool-desc{font-size:13px;color:var(--muted);margin-bottom:24px}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px}
.drop{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:42px 20px;text-align:center;cursor:pointer;transition:.18s;color:var(--muted)}
.drop:hover,.drop.over{border-color:var(--gold);background:rgba(212,165,116,.05);color:var(--text)}
.drop svg{width:38px;height:38px;color:var(--gold-deep);margin-bottom:12px}
.drop .big{font-size:15px;color:var(--text);margin-bottom:4px}
.drop .sm{font-size:12px;color:var(--faint)}

.opts{display:flex;flex-direction:column;gap:16px;margin-top:22px}
.opt-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.opt-row label{font-size:13px;color:var(--muted);min-width:96px}
input[type=text],input[type=number],select{background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--gold)}
input[type=number]{width:90px}
input[type=text]{flex:1;min-width:160px}
.radio-grp{display:flex;gap:8px;flex-wrap:wrap}
.radio-grp label{display:inline-flex;align-items:center;gap:6px;min-width:auto;background:var(--bg);border:1px solid var(--border2);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);transition:.15s}
.radio-grp label:has(input:checked){border-color:var(--gold);background:rgba(212,165,116,.08);color:var(--gold)}
.radio-grp input{accent-color:var(--gold)}
.range-row{display:flex;align-items:center;gap:12px}
input[type=range]{flex:1;accent-color:var(--gold)}

.btn{background:var(--gold);color:var(--ink);border:none;border-radius:9px;padding:12px 28px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{background:#e0b585}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn svg{width:17px;height:17px}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--gold);background:rgba(212,165,116,.06)}
.actions{margin-top:24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}

.filelist{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.fileitem{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px}
.fileitem .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fileitem .fs{color:var(--faint);font-size:12px}
.fileitem .rm{background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;line-height:1;padding:0 4px}
.fileitem .rm:hover{color:var(--pink)}
.fileitem .mv{background:none;border:none;color:var(--faint);cursor:pointer;padding:0 2px}
.fileitem .mv:hover{color:var(--gold)}
.fileitem .mv svg{width:15px;height:15px}

.status{margin-top:18px;font-size:13px;color:var(--muted);min-height:20px}
.status.ok{color:var(--gold)}
.status.err{color:var(--pink)}

.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-top:20px}
.thumb{position:relative;border:2px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;background:#fff;transition:.15s}
.thumb canvas{width:100%;display:block}
.thumb:hover{border-color:var(--gold-deep)}
.thumb.sel{border-color:var(--gold)}
.thumb .ord{position:absolute;top:5px;left:5px;background:var(--gold);color:var(--ink);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.thumb .pg{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:11px;text-align:center;padding:2px}

#sigPad{background:#fff;border-radius:8px;border:1px solid var(--border2);touch-action:none;width:100%;max-width:460px;display:block;cursor:crosshair}
.hint{font-size:12px;color:var(--faint);margin-top:8px;line-height:1.8;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.note-warn{font-size:12px;color:var(--gold);background:rgba(212,165,116,.07);border:1px solid rgba(212,165,116,.2);border-radius:8px;padding:10px 14px;margin-top:14px;line-height:1.6}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(212,165,116,.3);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}

.ptoolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 0;align-items:center}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-top:18px}
.rcell{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:10px}
.rcell canvas{max-width:100%;height:auto;box-shadow:0 2px 10px rgba(0,0,0,.45);background:#fff}
.rcell .pn{font-size:11px;color:var(--muted)}
.rbtns{display:flex;gap:6px}
.rbtns button{background:var(--surface2);border:1px solid var(--border2);color:var(--text);width:32px;height:32px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.rbtns button:hover{border-color:var(--gold);color:var(--gold)}
.rbtns button svg{width:16px;height:16px}
.previewbox{position:relative;display:inline-block;margin:0 auto;max-width:100%}
.previewbox>canvas{display:block;max-width:100%;height:auto;box-shadow:0 4px 20px rgba(0,0,0,.5);background:#fff}
.wm-ov{position:absolute;top:50%;left:50%;transform-origin:center center;pointer-events:none}
.wm-ov img{display:block;width:100%}
.pgnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px;font-size:13px;color:var(--muted)}
.pgnav button{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 12px;cursor:pointer}
.pgnav button:hover{border-color:var(--gold)}
.signpages{position:relative;max-height:600px;overflow:auto;margin-top:16px;border:1px solid var(--border);border-radius:10px;padding:16px;background:var(--bg)}
.spage{position:relative;margin:0 auto 16px;width:fit-content}
.spage>canvas{display:block;box-shadow:0 2px 12px rgba(0,0,0,.45);background:#fff;max-width:100%}
.sig-ov{position:absolute;cursor:move;border:1.5px dashed var(--gold);background:rgba(212,165,116,.06);touch-action:none;z-index:5}
.sig-ov img{display:block;width:100%;height:100%;pointer-events:none}
footer{text-align:center;color:var(--faint);font-size:12px;margin-top:60px;line-height:1.8}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<div class="wrap">

<header>
  <div class="logo">PDF <b>工具箱</b></div>
  <div class="tagline">常用 PDF 操作一站搞定，打开即用、所见即所得</div>
  <div class="trust"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 3v6c0 5-3.5 8-8 11-4.5-3-8-6-8-11V5l8-3z"/></svg> 全程在你的浏览器本地处理，文件不上传、不离开你的电脑</div>
</header>

<div class="home" id="home"></div>

<div class="tool" id="toolView">
  <button class="back" onclick="goHome()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回全部工具</button>
  <div class="tool-head"><span class="ic" id="tIcon"></span><h2 id="tName"></h2></div>
  <div class="tool-desc" id="tDesc"></div>
  <div id="tBody"></div>
</div>

<footer>PDF 工具箱 · 纯浏览器本地处理，不上传任何文件<br>by Santaya</footer>
</div>

<script src="vendor/pdf-lib.min.js"></script>
<script src="vendor/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'vendor/pdf.worker.min.js';
const { PDFDocument, degrees } = PDFLib;

const IC = {
  merge:'<path d="M9 3H5a2 2 0 0 0-2 2v4M15 3h4a2 2 0 0 1 2 2v4M3 15v4a2 2 0 0 0 2 2h4M21 15v4a2 2 0 0 1-2 2h-4M8 12h8"/>',
  split:'<path d="M6 3v6a3 3 0 0 0 3 3h6a3 3 0 0 1 3 3v6M6 21v-6M18 3v3"/>',
  rotate:'<path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>',
  trash:'<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6"/>',
  reorder:'<path d="M3 6h18M3 12h18M3 18h18"/>',
  img2pdf:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
  pdf2img:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13l2 2 4-4"/>',
  number:'<path d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/>',
  watermark:'<path d="M12 2L4 7v10l8 5 8-5V7l-8-5z"/><path d="M8 12h8M9 15h6" stroke-width="1.4" opacity=".7"/>',
  sign:'<path d="M3 17s3-1 5-4 3-6 4-6 1 4 2 4 2-2 3-2 4 4 4 4"/><path d="M3 21h18"/>',
  compress:'<path d="M9 9L4 4M9 4v5H4M15 9l5-5M15 4v5h5M9 15l-5 5M9 20v-5H4M15 15l5 5M15 20v-5h5"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
  ccw:'<path d="M9 14l-4-4 4-4"/><path d="M5 10h8a4 4 0 0 1 4 4v2"/>',
  cw:'<path d="M15 14l4-4-4-4"/><path d="M19 10h-8a4 4 0 0 0-4 4v2"/>',
};
function svg(p,sw){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||1.8}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;}

const TOOLS = [
  {id:'merge', ic:'merge', name:'合并 PDF', desc:'把多个 PDF 按顺序合并成一个文件'},
  {id:'split', ic:'split', name:'拆分 PDF', desc:'把一个 PDF 按每 N 页或指定范围拆成多个'},
  {id:'rotate', ic:'rotate', name:'旋转页面', desc:'看着每一页，逐页或整体旋转，实时预览'},
  {id:'delete', ic:'trash', name:'删除页面', desc:'删掉指定的页（空白页、广告页等）'},
  {id:'organize', ic:'reorder', name:'提取 / 重排', desc:'缩略图里点选要的页，按点击顺序导出'},
  {id:'img2pdf', ic:'img2pdf', name:'图片转 PDF', desc:'把多张图片（截图/照片）合成一个 PDF'},
  {id:'pdf2img', ic:'pdf2img', name:'PDF 转图片', desc:'把每一页导出成 PNG / JPG 图片'},
  {id:'number', ic:'number', name:'添加页码', desc:'给每页底部加页码，位置和格式可调'},
  {id:'watermark', ic:'watermark', name:'添加水印', desc:'实时预览，调大小/角度/透明度，支持中文'},
  {id:'sign', ic:'sign', name:'电子签名', desc:'手写签名，拖到任意页任意位置，再下载'},
  {id:'compress', ic:'compress', name:'压缩 PDF', desc:'减小文件体积，方便发邮件（有损，尽力版）'},
];

function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(2)+' MB';}
function dl(bytes,name,type){const blob=new Blob([bytes],{type:type||'application/pdf'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),2000);}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function setStatus(html,cls){const e=document.getElementById('status');if(e){e.className='status'+(cls?' '+cls:'');e.innerHTML=html;}}
function parseRanges(str,max){
  const out=[];str.split(',').forEach(part=>{part=part.trim();if(!part)return;const m=part.match(/^(\d+)\s*-\s*(\d+)$/);if(m){let a=+m[1],b=+m[2];if(a>b)[a,b]=[b,a];for(let i=a;i<=b;i++)if(i>=1&&i<=max)out.push(i-1);}else{const n=+part;if(n>=1&&n<=max)out.push(n-1);}});return out;}
function textToPng(text,{size=48,color='#888',opacity=1,font="'PingFang SC',sans-serif",pad=10}={}){
  const m=document.createElement('canvas').getContext('2d');
  m.font=`${size}px ${font}`;const w=Math.ceil(m.measureText(text).width)+pad*2;const h=Math.ceil(size*1.4)+pad*2;
  const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');
  ctx.font=`${size}px ${font}`;ctx.textBaseline='middle';ctx.textAlign='center';ctx.globalAlpha=opacity;ctx.fillStyle=color;
  ctx.fillText(text,w/2,h/2);
  return {dataUrl:c.toDataURL('image/png'),w,h};
}
async function pngBytes(dataUrl){return new Uint8Array(await (await fetch(dataUrl)).arrayBuffer());}
function fileToDataURL(f){return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f);});}
function loadImg(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=src;});}
async function loadPdfPages(file,scale){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);const vp=page.getViewport({scale});
    const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    const v1=page.getViewport({scale:1});pages.push({canvas:c,pdfW:v1.width,pdfH:v1.height});
  }
  return {pages};
}
function drawRotated(dst,src,deg){const r=((deg%360)+360)%360;if(r===90||r===270){dst.width=src.height;dst.height=src.width;}else{dst.width=src.width;dst.height=src.height;}const x=dst.getContext('2d');x.save();x.translate(dst.width/2,dst.height/2);x.rotate(r*Math.PI/180);x.drawImage(src,-src.width/2,-src.height/2);x.restore();}
async function rotateImage(dataUrl,deg){const img=await loadImg(dataUrl);const r=deg*Math.PI/180;const w=img.width,h=img.height;const bw=Math.abs(w*Math.cos(r))+Math.abs(h*Math.sin(r));const bh=Math.abs(w*Math.sin(r))+Math.abs(h*Math.cos(r));const c=document.createElement('canvas');c.width=bw;c.height=bh;const x=c.getContext('2d');x.translate(bw/2,bh/2);x.rotate(r);x.drawImage(img,-w/2,-h/2);return {dataUrl:c.toDataURL('image/png'),w:bw,h:bh};}

function dropzone(id,{accept,multiple,big,sm,onFiles}){
  setTimeout(()=>{
    const dz=document.getElementById(id);if(!dz)return;
    const inp=document.createElement('input');inp.type='file';inp.accept=accept||'';inp.multiple=!!multiple;inp.style.display='none';
    dz.appendChild(inp);
    dz.onclick=()=>inp.click();
    inp.onchange=()=>{if(inp.files.length)onFiles([...inp.files]);inp.value='';};
    dz.ondragover=e=>{e.preventDefault();dz.classList.add('over');};
    dz.ondragleave=()=>dz.classList.remove('over');
    dz.ondrop=e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files.length)onFiles([...e.dataTransfer.files]);};
  },0);
  return `<div class="drop" id="${id}">${svg(IC.upload)}<div class="big">${big||'点击选择或拖拽文件到这里'}</div><div class="sm">${sm||''}</div></div>`;
}

function renderHome(){
  document.getElementById('home').innerHTML='<div class="grid">'+TOOLS.map(t=>
    `<button class="card" onclick="openTool('${t.id}')"><span class="ic">${svg(IC[t.ic])}</span><h3>${t.name}</h3><p>${t.desc}</p></button>`
  ).join('')+'</div>';
}
function goHome(){document.getElementById('toolView').classList.remove('active');document.getElementById('home').classList.remove('hide');window.scrollTo(0,0);}
function openTool(id){
  const t=TOOLS.find(x=>x.id===id);
  document.getElementById('home').classList.add('hide');
  document.getElementById('toolView').classList.add('active');
  document.getElementById('tIcon').innerHTML=svg(IC[t.ic]);
  document.getElementById('tName').textContent=t.name;
  document.getElementById('tDesc').textContent=t.desc;
  document.getElementById('tBody').innerHTML='';
  window.scrollTo(0,0);
  BUILD[id]();
}

const BUILD={};

BUILD.merge=()=>{
  let files=[];const body=document.getElementById('tBody');
  body.innerHTML=`<div class="panel">${dropzone('dz',{accept:'application/pdf',multiple:true,big:'选择或拖入多个 PDF',sm:'可多选，下面可调整顺序',onFiles:add})}
    <div class="filelist" id="fl"></div>
    <div class="actions"><button class="btn" id="run" disabled>${svg(IC.merge)} 合并并下载</button></div>
    <div class="status" id="status"></div></div>`;
  function add(fs){files=files.concat(fs.filter(f=>f.type==='application/pdf'));render();}
  function render(){
    document.getElementById('fl').innerHTML=files.map((f,i)=>
      `<div class="fileitem"><button class="mv" onclick="window._mvU(${i})">${svg('<path d="M18 15l-6-6-6 6"/>')}</button><button class="mv" onclick="window._mvD(${i})">${svg('<path d="M6 9l6 6 6-6"/>')}</button><span class="fn">${f.name}</span><span class="fs">${fmtSize(f.size)}</span><button class="rm" onclick="window._rm(${i})">✕</button></div>`).join('');
    document.getElementById('run').disabled=files.length<2;
  }
  window._rm=i=>{files.splice(i,1);render();};

      const img=await doc.embedPng(await pngBytes(rot.dataUrl));
      doc.getPages().forEach(p=>{const pw=p.getWidth(),ph=p.getHeight();const dw=pw*sz/100;const dh=dw*rot.h/rot.w;
        p.drawImage(img,{x:(pw-dw)/2,y:(ph-dh)/2,width:dw,height:dh,opacity:op/100});});
      dl(await doc.save(),file.name.replace(/\.pdf$/i,'')+'_水印.pdf');
      setStatus('✓ 已给 '+doc.getPageCount()+' 页加水印','ok');
    }catch(e){setStatus('✗ 失败：'+e.message,'err');}
  };
};

BUILD.sign=()=>{
  let file=null,pages=[],sigUrl=null,drawing=false,hasSig=false;const body=document.getElementById('tBody');
  body.innerHTML=`<div class="panel">${dropzone('dz',{accept:'application/pdf',big:'选择或拖入要签名的 PDF',sm:'加载后会显示所有页面',onFiles:load})}
    <div class="status" id="info" style="margin-top:14px"></div>
    <div id="step2" style="display:none;margin-top:18px">
      <label style="font-size:13px;color:var(--muted)">① 手写签名：</label>
      <canvas id="sigPad" width="460" height="170" style="margin-top:8px"></canvas>
      <div class="hint">鼠标 / 手指书写。<button class="btn btn-ghost" id="clr" style="padding:5px 14px;font-size:12px">清空</button><button class="btn" id="place" style="padding:5px 16px;font-size:12px" disabled>② 确定，去页面放置</button></div>
      <div class="opt-row" id="szrow" style="display:none;margin-top:6px"><label>签名大小</label><div class="range-row" style="flex:1;max-width:320px"><input type="range" id="sz" min="60" max="340" value="160"></div></div>
      <div class="hint" id="ph" style="display:none">③ 把金色虚线框的签名拖到任意页的任意位置，然后点下方下载。</div>
    </div>
    <div class="signpages" id="pages" style="display:none"></div>
    <div class="actions" id="acts" style="display:none"><button class="btn" id="run">${svg(IC.sign)} 盖签名并下载</button></div>
    <div class="status" id="status"></div></div>`;
  const cv=document.getElementById('sigPad'),ctx=cv.getContext('2d');ctx.strokeStyle='#0b1a3a';ctx.lineWidth=2.6;ctx.lineCap='round';ctx.lineJoin='round';
  function pt(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*cv.width/r.width,y:(t.clientY-r.top)*cv.height/r.height};}
  function sdown(e){e.preventDefault();drawing=true;hasSig=true;const p=pt(e);ctx.beginPath();ctx.moveTo(p.x,p.y);document.getElementById('place').disabled=false;}
  function smove(e){if(!drawing)return;e.preventDefault();const p=pt(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  cv.onmousedown=sdown;cv.onmousemove=smove;window.addEventListener('mouseup',()=>drawing=false);
  cv.ontouchstart=sdown;cv.ontouchmove=smove;cv.ontouchend=()=>drawing=false;
  document.getElementById('clr').onclick=()=>{ctx.clearRect(0,0,cv.width,cv.height);hasSig=false;document.getElementById('place').disabled=true;};
  async function load(f){
    file=f[0];document.getElementById('info').textContent='已选：'+file.name;document.getElementById('step2').style.display='block';
    setStatus('<span class="spin"></span>渲染页面…');
    try{
      const r=await loadPdfPages(file,1.3);pages=r.pages;
      const wrap=document.getElementById('pages');wrap.innerHTML='';
      pages.forEach((p,i)=>{const sp=document.createElement('div');sp.className='spage';sp.dataset.i=i;
        const c=document.createElement('canvas');c.width=p.canvas.width;c.height=p.canvas.height;c.style.width=Math.min(p.canvas.width,640)+'px';c.getContext('2d').drawImage(p.canvas,0,0);
        sp.appendChild(c);wrap.appendChild(sp);});
      wrap.style.display='block';setStatus('共 '+pages.length+' 页，先在上方手写签名');
    }catch(e){setStatus('✗ 渲染失败：'+e.message,'err');}
  }
  document.getElementById('place').onclick=()=>{
    if(!hasSig)return;sigUrl=cv.toDataURL('image/png');
    document.getElementById('szrow').style.display='flex';document.getElementById('ph').style.display='flex';document.getElementById('acts').style.display='flex';
    let ov=document.getElementById('sigOv');if(ov)ov.remove();
    ov=document.createElement('div');ov.className='sig-ov';ov.id='sigOv';
    const w=+document.getElementById('sz').value;ov.style.width=w+'px';ov.style.height=(w*cv.height/cv.width)+'px';ov.style.left='40px';ov.style.top='40px';
    ov.innerHTML=`<img src="${sigUrl}">`;
    (document.querySelector('.spage')||document.getElementById('pages')).appendChild(ov);
    dragify(ov);
  };
  document.getElementById('sz').addEventListener('input',()=>{const ov=document.getElementById('sigOv');if(ov){const w=+document.getElementById('sz').value;ov.style.width=w+'px';ov.style.height=(w*cv.height/cv.width)+'px';}});
  function dragify(ov){
    let sx,sy,ol,ot;
    function down(e){e.preventDefault();const t=e.touches?e.touches[0]:e;sx=t.clientX;sy=t.clientY;ol=ov.offsetLeft;ot=ov.offsetTop;document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);}
    function mv(e){const t=e.touches?e.touches[0]:e;e.preventDefault();let nl=ol+(t.clientX-sx),nt=ot+(t.clientY-sy);
      const cx=t.clientX,cy=t.clientY;
      for(const sp of document.querySelectorAll('.spage')){const r=sp.getBoundingClientRect();if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){if(sp!==ov.parentElement)sp.appendChild(ov);const pr=ov.parentElement.getBoundingClientRect();nl=cx-pr.left-ov.offsetWidth/2;nt=cy-pr.top-ov.offsetHeight/2;break;}}
      ov.style.left=nl+'px';ov.style.top=nt+'px';}
    function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up);}
    ov.addEventListener('mousedown',down);ov.addEventListener('touchstart',down,{passive:false});
  }
  document.getElementById('run').onclick=async()=>{
    const ov=document.getElementById('sigOv');if(!ov||!ov.parentElement.classList.contains('spage')){setStatus('✗ 请先把签名拖到某一页上','err');return;}
    setStatus('<span class="spin"></span>处理中…');
    try{
      const sp=ov.parentElement;const pi=+sp.dataset.i;const cvp=sp.querySelector('canvas');
      const scale=pages[pi].pdfW/cvp.clientWidth;
      const x=ov.offsetLeft*scale,w=ov.offsetWidth*scale,h=ov.offsetHeight*scale,y=pages[pi].pdfH-ov.offsetTop*scale-h;
      const doc=await PDFDocument.load(await file.arrayBuffer());
      const img=await doc.embedPng(await pngBytes(sigUrl));
      doc.getPage(pi).drawImage(img,{x,y,width:w,height:h});
      dl(await doc.save(),file.name.replace(/\.pdf$/i,'')+'_已签名.pdf');
      setStatus('✓ 已把签名盖到第 '+(pi+1)+' 页','ok');
    }catch(e){setStatus('✗ 失败：'+e.message,'err');}
  };
};

BUILD.compress=()=>{
  let file=null;const body=document.getElementById('tBody');
  body.innerHTML=`<div class="panel">${dropzone('dz',{accept:'application/pdf',big:'选择或拖入一个 PDF',onFiles:f=>{file=f[0];document.getElementById('info').textContent='已选：'+file.name+'（'+fmtSize(f.size)+'）';document.getElementById('run').disabled=false;}})}
    <div class="status" id="info" style="margin-top:14px"></div>
    <div class="opts"><div class="opt-row"><label>压缩力度</label><div class="radio-grp"><label><input type="radio" name="lv" value="high"> 强（最小）</label><label><input type="radio" name="lv" value="mid" checked> 中</label><label><input type="radio" name="lv" value="low"> 轻（保清晰）</label></div></div></div>
    <div class="note-warn">⚠️ 这是「尽力版」压缩：把每页转成图片再重组，会变成<b>不可选中文字的扫描件效果</b>，适合"只要能看、要发出去"的场景。要保留可选文字请别用它。</div>
    <div class="actions"><button class="btn" id="run" disabled>${svg(IC.compress)} 压缩并下载</button></div>
    <div class="status" id="status"></div></div>`;
  document.getElementById('run').onclick=async()=>{
    setStatus('<span class="spin"></span>压缩中…');
    try{
      const lv=document.querySelector('input[name=lv]:checked').value;
      const scale={high:1,mid:1.4,low:2}[lv];const q={high:.5,mid:.65,low:.8}[lv];
      const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;const out=await PDFDocument.create();
      for(let i=1;i<=pdf.numPages;i++){
        setStatus(`<span class="spin"></span>压缩第 ${i}/${pdf.numPages} 页…`);
        const page=await pdf.getPage(i);const vp=page.getViewport({scale});
        const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;const cx=c.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,c.width,c.height);
        await page.render({canvasContext:cx,viewport:vp}).promise;
        const img=await out.embedJpg(await pngBytes(c.toDataURL('image/jpeg',q)));
        const pg=out.addPage([img.width,img.height]);pg.drawImage(img,{x:0,y:0,width:img.width,height:img.height});
      }
      const bytes=await out.save();
      const ratio=Math.round((1-bytes.length/file.size)*100);
      dl(bytes,file.name.replace(/\.pdf$/i,'')+'_压缩.pdf');
      setStatus(`✓ 完成：${fmtSize(file.size)} → ${fmtSize(bytes.length)}（${ratio>0?'小了 '+ratio+'%':'没变小，原文件已很精简'}）`,'ok');
    }catch(e){setStatus('✗ 失败：'+e.message,'err');}
  };
};
